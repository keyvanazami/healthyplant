name: HealthyPlant
options:
  bundleIdPrefix: com.healthyplant
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.4.0"
  FirebaseSDK:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "10.22.0"

targets:
  HealthyPlant:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HealthyPlant
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthyplant.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: HealthyPlant/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Lottie
      - package: FirebaseSDK
        product: FirebaseAuth
      - package: FirebaseSDK
        product: FirebaseMessaging

  HealthyPlantTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HealthyPlantTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthyplant.app.tests
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: HealthyPlant

  HealthyPlantUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HealthyPlantUITests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthyplant.app.uitests
        SWIFT_VERSION: "5.9"
        TEST_TARGET_NAME: HealthyPlant
    dependencies:
      - target: HealthyPlant
