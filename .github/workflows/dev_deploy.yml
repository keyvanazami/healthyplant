name: Dev Backend Deploy (PR)

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

concurrency:
  group: dev-deploy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  PROJECT_ID: healthyplant-209678
  SERVICE_NAME: healthyplant-api-dev
  REGION: us-central1
  IMAGE: gcr.io/healthyplant-209678/healthyplant-api-dev

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/api/requirements.txt

      - name: Install dependencies
        working-directory: backend/api
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend/api
        env:
          ANTHROPIC_API_KEY: "test-key-not-real"
          GCP_PROJECT_ID: "test-project"
          GCS_BUCKET_NAME: "test-bucket"
        run: pytest -v --tb=short

  deploy-dev:
    name: Deploy to Dev
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push Docker image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            backend/api
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run (Dev)
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --update-env-vars="ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}" \
            --quiet

      - name: Get dev URL and health check
        id: url
        run: |
          DEV_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format="value(status.url)")
          echo "dev_url=$DEV_URL" >> "$GITHUB_OUTPUT"
          for i in 1 2 3 4 5; do
            if curl -sf "$DEV_URL/health" | grep -q "healthy"; then
              echo "Health check passed on attempt $i"
              break
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Post dev URL as PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DEV_URL="${{ steps.url.outputs.dev_url }}"
          gh pr comment ${{ github.event.pull_request.number }} --body "## Dev Backend Deployed

          **URL:** $DEV_URL
          **Commit:** ${{ github.sha }}
          [View logs](https://console.cloud.google.com/run/detail/${{ env.REGION }}/${{ env.SERVICE_NAME }}/logs?project=${{ env.PROJECT_ID }})"
