name: Dev Backend Deploy (PR)

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

concurrency:
  group: dev-deploy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/api/requirements.txt

      - name: Install dependencies
        working-directory: backend/api
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend/api
        env:
          ANTHROPIC_API_KEY: "test-key-not-real"
          GCP_PROJECT_ID: "test-project"
          GCS_BUCKET_NAME: "test-bucket"
        run: pytest -v --tb=short

  deploy-dev:
    name: Deploy to Dev
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (Dev)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: healthy-plant-api-dev
          source: backend/api
          region: us-central1
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          env_vars: |
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}

      - name: Get dev URL
        id: url
        run: |
          DEV_URL=$(gcloud run services describe healthy-plant-api-dev \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format "value(status.url)")
          echo "dev_url=$DEV_URL" >> "$GITHUB_OUTPUT"

      - name: Health check
        run: |
          DEV_URL="${{ steps.url.outputs.dev_url }}"
          echo "Dev URL: $DEV_URL"
          # Retry health check up to 5 times with 10s delay
          for i in 1 2 3 4 5; do
            if curl -sf "$DEV_URL/health" | grep -q "healthy"; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Post dev URL as PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DEV_URL="${{ steps.url.outputs.dev_url }}"
          COMMENT="## 🚀 Dev Backend Deployed

          **URL:** $DEV_URL
          **Service:** \`healthy-plant-api-dev\`
          **Region:** us-central1
          **Health:** ✅ Verified

          This deployment will be available for testing until the PR is closed.

          ---
          *Commit: ${{ github.sha }} · [View logs](https://console.cloud.google.com/run/detail/us-central1/healthy-plant-api-dev/logs)*"

          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT"
