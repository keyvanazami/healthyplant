name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "README.md"

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_ID: healthyplant-209678
  SERVICE_NAME: healthyplant-api-prod
  REGION: us-central1
  IMAGE: gcr.io/healthyplant-209678/healthyplant-api

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/api/requirements.txt

      - name: Install dependencies
        working-directory: backend/api
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend/api
        env:
          ANTHROPIC_API_KEY: "test-key-not-real"
          GCP_PROJECT_ID: "test-project"
          GCS_BUCKET_NAME: "test-bucket"
        run: pytest -v --tb=short

  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push Docker image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            backend/api
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --update-env-vars="ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}" \
            --quiet

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "Production URL: $URL"
          curl -sf "$URL/health" | grep -q "healthy"
          echo "Health check passed"
