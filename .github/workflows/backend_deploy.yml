name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/api/requirements.txt

      - name: Install dependencies
        working-directory: backend/api
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend/api
        env:
          ANTHROPIC_API_KEY: "test-key-not-real"
          GCP_PROJECT_ID: "test-project"
          GCS_BUCKET_NAME: "test-bucket"
        run: pytest -v --tb=short

  deploy-staging:
    name: Deploy to Staging
    needs: test
    runs-on: ubuntu-latest
    environment: staging

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: healthy-plant-api-staging
          source: backend/api
          region: us-central1
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          env_vars: |
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}

      - name: Verify staging deployment
        run: |
          STAGING_URL=$(gcloud run services describe healthy-plant-api-staging \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format "value(status.url)")
          echo "Staging URL: $STAGING_URL"
          curl -sf "$STAGING_URL/health" | grep -q "healthy"
          echo "Staging health check passed"

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (Production)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: healthy-plant-api
          source: backend/api
          region: us-central1
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          env_vars: |
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}

      - name: Verify production deployment
        run: |
          PROD_URL=$(gcloud run services describe healthy-plant-api \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format "value(status.url)")
          echo "Production URL: $PROD_URL"
          curl -sf "$PROD_URL/health" | grep -q "healthy"
          echo "Production health check passed"
