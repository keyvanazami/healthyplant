; PlatformIO build config for HealthyPlant Sensor
;
; Build for your board:
;   pio run -e esp32s3       (Espressif ESP32-S3 DevKitC-1)
;   pio run -e esp32         (HiLetgo ESP32 ESP-32D)
;
; Upload:
;   pio run -e esp32s3 -t upload
;   pio run -e esp32 -t upload
;
; Monitor:
;   pio device monitor

[platformio]
src_dir = healthyplant-sensor

[common]
framework = arduino
monitor_speed = 115200
lib_deps =
    claws/BH1750@^1.3.0
    adafruit/Adafruit BME280 Library@^2.2.2
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0

; ── ESP32-S3 DevKitC-1 ──────────────────────────
[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps = ${common.lib_deps}
build_flags =
    -DBOARD_ESP32S3
    -DARDUINO_USB_CDC_ON_BOOT=1

; ── HiLetgo ESP32 ESP-32D (CP2102) ──────────────
[env:esp32]
platform = espressif32
board = esp32dev
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps = ${common.lib_deps}
build_flags =
    -DBOARD_ESP32
