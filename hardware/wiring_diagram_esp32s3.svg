<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="monospace" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="680" fill="#1a1a1a" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" fill="#00C853" font-size="20" font-weight="bold" text-anchor="middle">HealthyPlant Sensor — Wiring Diagram</text>
  <text x="450" y="55" fill="#888" font-size="12" text-anchor="middle">ESP32-S3 DevKitC-1 + 4 Sensors (Indoor &amp; Outdoor)</text>

  <!-- ==================== ESP32 (center) ==================== -->
  <rect x="320" y="160" width="260" height="300" rx="10" fill="#2a2a2a" stroke="#00C853" stroke-width="2"/>
  <text x="450" y="185" fill="#00C853" font-size="16" font-weight="bold" text-anchor="middle">ESP32-S3</text>
  <text x="450" y="202" fill="#666" font-size="10" text-anchor="middle">DevKitC-1 (USB-C)</text>

  <!-- ESP32 Left pins -->
  <text x="338" y="240" fill="#ff6b6b" font-size="11" font-weight="bold">3.3V</text>
  <text x="338" y="270" fill="#ff6b6b" font-size="11" font-weight="bold">5V</text>
  <text x="338" y="300" fill="#4ecdc4" font-size="11" font-weight="bold">GND</text>
  <text x="338" y="340" fill="#ffd93d" font-size="11" font-weight="bold">GPIO4</text>
  <text x="338" y="370" fill="#ffd93d" font-size="11" font-weight="bold">GPIO5</text>
  <text x="338" y="400" fill="#a78bfa" font-size="11" font-weight="bold">GPIO8</text>
  <text x="338" y="430" fill="#a78bfa" font-size="11" font-weight="bold">GPIO9</text>

  <!-- ESP32 Right pins -->
  <text x="505" y="240" fill="#888" font-size="10" text-anchor="end">Power 3.3V</text>
  <text x="505" y="270" fill="#888" font-size="10" text-anchor="end">Power 5V</text>
  <text x="505" y="300" fill="#888" font-size="10" text-anchor="end">Ground</text>
  <text x="505" y="340" fill="#888" font-size="10" text-anchor="end">ADC (Soil)</text>
  <text x="505" y="370" fill="#888" font-size="10" text-anchor="end">OneWire</text>
  <text x="505" y="400" fill="#888" font-size="10" text-anchor="end">I2C SDA</text>
  <text x="505" y="430" fill="#888" font-size="10" text-anchor="end">I2C SCL</text>

  <!-- Pin dots (left side) -->
  <circle cx="328" cy="237" r="4" fill="#ff6b6b"/>
  <circle cx="328" cy="267" r="4" fill="#ff6b6b"/>
  <circle cx="328" cy="297" r="4" fill="#4ecdc4"/>
  <circle cx="328" cy="337" r="4" fill="#ffd93d"/>
  <circle cx="328" cy="367" r="4" fill="#ffd93d"/>
  <circle cx="328" cy="397" r="4" fill="#a78bfa"/>
  <circle cx="328" cy="427" r="4" fill="#a78bfa"/>

  <!-- USB-C port -->
  <rect x="415" y="440" width="70" height="20" rx="4" fill="#333" stroke="#666" stroke-width="1"/>
  <text x="450" y="454" fill="#aaa" font-size="9" text-anchor="middle">USB-C</text>

  <!-- ==================== Soil Moisture Sensor (top left) ==================== -->
  <rect x="30" y="80" width="200" height="100" rx="8" fill="#2a2a2a" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="130" y="105" fill="#4ecdc4" font-size="13" font-weight="bold" text-anchor="middle">Soil Moisture</text>
  <text x="130" y="120" fill="#666" font-size="10" text-anchor="middle">Capacitive v2.0</text>
  <text x="50" y="145" fill="#ff6b6b" font-size="10">VCC (3.3-5V)</text>
  <text x="50" y="160" fill="#4ecdc4" font-size="10">GND</text>
  <text x="50" y="175" fill="#ffd93d" font-size="10">AOUT</text>

  <!-- Wires: Soil Moisture → ESP32 -->
  <path d="M230,142 L280,142 L280,267 L328,267" stroke="#ff6b6b" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <path d="M230,157 L270,157 L270,297 L328,297" stroke="#4ecdc4" stroke-width="2" fill="none"/>
  <path d="M230,172 L260,172 L260,337 L328,337" stroke="#ffd93d" stroke-width="2" fill="none"/>
  <text x="275" y="260" fill="#ff6b6b" font-size="9">5V</text>
  <text x="265" y="292" fill="#4ecdc4" font-size="9">GND</text>
  <text x="250" y="332" fill="#ffd93d" font-size="9">GPIO4</text>

  <!-- ==================== DS18B20 Soil Temp (bottom left) ==================== -->
  <rect x="30" y="370" width="200" height="120" rx="8" fill="#2a2a2a" stroke="#ff9f43" stroke-width="1.5"/>
  <text x="130" y="395" fill="#ff9f43" font-size="13" font-weight="bold" text-anchor="middle">DS18B20</text>
  <text x="130" y="410" fill="#666" font-size="10" text-anchor="middle">Waterproof Soil Probe</text>
  <text x="50" y="438" fill="#ff6b6b" font-size="10">VCC (3.3V)</text>
  <text x="50" y="453" fill="#4ecdc4" font-size="10">GND</text>
  <text x="50" y="468" fill="#ffd93d" font-size="10">DATA</text>

  <!-- 4.7k Resistor symbol -->
  <rect x="165" y="425" width="50" height="18" rx="3" fill="#333" stroke="#ff9f43" stroke-width="1"/>
  <text x="190" y="437" fill="#ff9f43" font-size="9" text-anchor="middle">4.7k</text>
  <text x="190" y="417" fill="#888" font-size="8" text-anchor="middle">pull-up</text>
  <!-- Resistor connections -->
  <line x1="190" y1="443" x2="190" y2="465" stroke="#ffd93d" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="190" y1="425" x2="190" y2="412" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Wires: DS18B20 → ESP32 -->
  <path d="M230,435 L290,435 L290,237 L328,237" stroke="#ff6b6b" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <path d="M230,450 L270,450 L270,297 L320,297" stroke="#4ecdc4" stroke-width="2" fill="none"/>
  <path d="M230,465 L260,465 L260,367 L328,367" stroke="#ffd93d" stroke-width="2" fill="none"/>
  <text x="255" y="362" fill="#ffd93d" font-size="9">GPIO5</text>

  <!-- ==================== BH1750 Light Sensor (top right) ==================== -->
  <rect x="670" y="80" width="200" height="100" rx="8" fill="#2a2a2a" stroke="#ffd93d" stroke-width="1.5"/>
  <text x="770" y="105" fill="#ffd93d" font-size="13" font-weight="bold" text-anchor="middle">BH1750</text>
  <text x="770" y="120" fill="#666" font-size="10" text-anchor="middle">Light Sensor (GY-302)</text>
  <text x="690" y="145" fill="#ff6b6b" font-size="10">VCC (3.3V)</text>
  <text x="690" y="160" fill="#4ecdc4" font-size="10">GND</text>
  <text x="690" y="175" fill="#a78bfa" font-size="10">SDA / SCL</text>

  <!-- Wires: BH1750 → ESP32 -->
  <path d="M670,142 L620,142 L620,237 L580,237" stroke="#ff6b6b" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <path d="M670,157 L630,157 L630,297 L580,297" stroke="#4ecdc4" stroke-width="2" fill="none"/>
  <path d="M670,170 L610,170 L610,397 L580,397" stroke="#a78bfa" stroke-width="2" fill="none"/>
  <path d="M670,178 L600,178 L600,427 L580,427" stroke="#a78bfa" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
  <text x="585" y="392" fill="#a78bfa" font-size="9">SDA</text>
  <text x="585" y="422" fill="#a78bfa" font-size="9">SCL</text>

  <!-- ==================== BME280 (right middle) ==================== -->
  <rect x="670" y="220" width="200" height="120" rx="8" fill="#2a2a2a" stroke="#74b9ff" stroke-width="1.5"/>
  <text x="770" y="248" fill="#74b9ff" font-size="13" font-weight="bold" text-anchor="middle">BME280</text>
  <text x="770" y="263" fill="#666" font-size="10" text-anchor="middle">Temp / Humidity / Pressure</text>
  <text x="690" y="290" fill="#ff6b6b" font-size="10">VCC (3.3V)</text>
  <text x="690" y="305" fill="#4ecdc4" font-size="10">GND</text>
  <text x="690" y="320" fill="#a78bfa" font-size="10">SDA / SCL (shared I2C)</text>

  <!-- Wires: BME280 → shared I2C bus (same lines as BH1750) -->
  <path d="M670,287 L640,287 L640,237 L620,237" stroke="#ff6b6b" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <path d="M670,302 L650,302 L650,297 L630,297" stroke="#4ecdc4" stroke-width="2" fill="none"/>
  <path d="M670,315 L610,315 L610,397" stroke="#a78bfa" stroke-width="2" fill="none"/>
  <path d="M670,320 L600,320 L600,427" stroke="#a78bfa" stroke-width="2" fill="none" stroke-dasharray="4,2"/>

  <!-- Shared I2C bus label -->
  <rect x="595" y="350" width="80" height="22" rx="4" fill="#333" stroke="#a78bfa" stroke-width="1"/>
  <text x="635" y="365" fill="#a78bfa" font-size="10" text-anchor="middle">Shared I2C</text>

  <!-- ==================== Power Section (outdoor, bottom) ==================== -->
  <rect x="250" y="530" width="400" height="120" rx="8" fill="#1e1e1e" stroke="#666" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="450" y="555" fill="#888" font-size="13" font-weight="bold" text-anchor="middle">OUTDOOR ONLY — Battery + Solar</text>

  <!-- Solar Panel -->
  <rect x="270" y="570" width="110" height="60" rx="5" fill="#2a2a2a" stroke="#ffd93d" stroke-width="1"/>
  <text x="325" y="593" fill="#ffd93d" font-size="11" font-weight="bold" text-anchor="middle">Solar Panel</text>
  <text x="325" y="608" fill="#666" font-size="9" text-anchor="middle">6V 1W</text>
  <text x="325" y="623" fill="#888" font-size="9" text-anchor="middle">+ / -</text>

  <!-- TP4056 -->
  <rect x="400" y="570" width="100" height="60" rx="5" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="450" y="593" fill="#ff6b6b" font-size="11" font-weight="bold" text-anchor="middle">TP4056</text>
  <text x="450" y="608" fill="#666" font-size="9" text-anchor="middle">USB-C Charger</text>
  <text x="450" y="623" fill="#888" font-size="9" text-anchor="middle">IN → BAT → OUT</text>

  <!-- 18650 Battery -->
  <rect x="520" y="570" width="110" height="60" rx="5" fill="#2a2a2a" stroke="#00C853" stroke-width="1"/>
  <text x="575" y="593" fill="#00C853" font-size="11" font-weight="bold" text-anchor="middle">18650</text>
  <text x="575" y="608" fill="#666" font-size="9" text-anchor="middle">3.7V 3000mAh</text>
  <text x="575" y="623" fill="#888" font-size="9" text-anchor="middle">+ / -</text>

  <!-- Power flow arrows -->
  <line x1="380" y1="600" x2="398" y2="600" stroke="#ffd93d" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="600" x2="518" y2="600" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- TP4056 OUT → ESP32 -->
  <path d="M450,570 L450,500 L450,470" stroke="#ff6b6b" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="460" y="490" fill="#ff6b6b" font-size="9">5V + GND</text>
  <text x="460" y="502" fill="#ff6b6b" font-size="9">to ESP32</text>

  <!-- ==================== Legend ==================== -->
  <rect x="30" y="530" width="190" height="120" rx="6" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="125" y="552" fill="#ccc" font-size="12" font-weight="bold" text-anchor="middle">Wire Colors</text>
  <line x1="50" y1="568" x2="80" y2="568" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="90" y="572" fill="#ff6b6b" font-size="10">3.3V / 5V Power</text>
  <line x1="50" y1="588" x2="80" y2="588" stroke="#4ecdc4" stroke-width="2"/>
  <text x="90" y="592" fill="#4ecdc4" font-size="10">Ground (GND)</text>
  <line x1="50" y1="608" x2="80" y2="608" stroke="#ffd93d" stroke-width="2"/>
  <text x="90" y="612" fill="#ffd93d" font-size="10">Data / Signal</text>
  <line x1="50" y1="628" x2="80" y2="628" stroke="#a78bfa" stroke-width="2"/>
  <text x="90" y="632" fill="#a78bfa" font-size="10">I2C Bus (SDA/SCL)</text>

  <!-- ==================== I2C Address Note ==================== -->
  <rect x="670" y="370" width="200" height="60" rx="6" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="770" y="392" fill="#aaa" font-size="11" font-weight="bold" text-anchor="middle">I2C Addresses</text>
  <text x="770" y="410" fill="#ffd93d" font-size="10" text-anchor="middle">BH1750: 0x23</text>
  <text x="770" y="425" fill="#74b9ff" font-size="10" text-anchor="middle">BME280: 0x76 (or 0x77)</text>
</svg>
