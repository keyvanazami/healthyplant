<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 720" font-family="monospace" font-size="11">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1150" height="720" fill="#1a1a1a" rx="12"/>

  <!-- Title -->
  <text x="575" y="28" fill="#00C853" font-size="18" font-weight="bold" text-anchor="middle">HealthyPlant Sensor — Wiring Diagram (ESP32)</text>
  <text x="575" y="46" fill="#888" font-size="11" text-anchor="middle">HiLetgo ESP32-WROOM-32 (38-pin, USB-C) + 4 Sensors</text>

  <!-- ======== Power buses ======== -->
  <!-- 3V3 bus -->
  <line x1="60" y1="60" x2="1090" y2="60" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="42" y="64" fill="#ff6b6b" font-size="9" text-anchor="end">3V3</text>
  <!-- GND bus -->
  <line x1="60" y1="72" x2="1090" y2="72" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="42" y="76" fill="#4ecdc4" font-size="9" text-anchor="end">GND</text>

  <!-- ======== ESP32 Board (center) ======== -->
  <!-- Board outline -->
  <rect x="430" y="82" width="230" height="458" rx="10" fill="#2a2a2a" stroke="#00C853" stroke-width="2"/>
  <text x="545" y="101" fill="#00C853" font-size="13" font-weight="bold" text-anchor="middle">ESP32-WROOM-32</text>
  <text x="545" y="115" fill="#555" font-size="9" text-anchor="middle">38-pin (USB-C / CP2102)</text>
  <!-- Antenna stub -->
  <rect x="495" y="82" width="100" height="12" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="545" y="92" fill="#444" font-size="8" text-anchor="middle">ANTENNA</text>
  <!-- USB-C -->
  <rect x="505" y="530" width="80" height="16" rx="4" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="545" y="542" fill="#777" font-size="8" text-anchor="middle">USB-C</text>
  <!-- WROOM module outline -->
  <rect x="453" y="118" width="184" height="180" rx="4" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="545" y="215" fill="#333" font-size="32" font-weight="bold" text-anchor="middle">ESP32</text>

  <!-- ======== LEFT PINS (19, top to bottom) ======== -->
  <!-- y positions: start=142, step=22 -->
  <!-- pin dots at x=430, labels at x=425 right-aligned -->

  <!-- Pin 1: 3V3 -->
  <circle cx="430" cy="142" r="5" fill="#ff6b6b"/>
  <text x="422" y="146" fill="#ff6b6b" font-size="10" font-weight="bold" text-anchor="end">3V3</text>
  <!-- tap to 3V3 bus -->
  <line x1="430" y1="142" x2="430" y2="60" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Pin 2: EN -->
  <circle cx="430" cy="164" r="4" fill="#555"/>
  <text x="422" y="168" fill="#555" font-size="10" text-anchor="end">EN</text>

  <!-- Pin 3: IO36 (input only) -->
  <circle cx="430" cy="186" r="4" fill="#555"/>
  <text x="422" y="190" fill="#555" font-size="10" text-anchor="end">IO36</text>

  <!-- Pin 4: IO39 (input only) -->
  <circle cx="430" cy="208" r="4" fill="#555"/>
  <text x="422" y="212" fill="#555" font-size="10" text-anchor="end">IO39</text>

  <!-- Pin 5: IO34 ← SOIL MOISTURE (ADC1) -->
  <circle cx="430" cy="230" r="6" fill="#ffd93d" stroke="#ffb300" stroke-width="1.5"/>
  <text x="422" y="234" fill="#ffd93d" font-size="10" font-weight="bold" text-anchor="end">IO34</text>

  <!-- Pin 6: IO35 -->
  <circle cx="430" cy="252" r="4" fill="#555"/>
  <text x="422" y="256" fill="#555" font-size="10" text-anchor="end">IO35</text>

  <!-- Pin 7: IO32 -->
  <circle cx="430" cy="274" r="4" fill="#555"/>
  <text x="422" y="278" fill="#555" font-size="10" text-anchor="end">IO32</text>

  <!-- Pin 8: IO33 -->
  <circle cx="430" cy="296" r="4" fill="#555"/>
  <text x="422" y="300" fill="#555" font-size="10" text-anchor="end">IO33</text>

  <!-- Pin 9: IO25 -->
  <circle cx="430" cy="318" r="4" fill="#555"/>
  <text x="422" y="322" fill="#555" font-size="10" text-anchor="end">IO25</text>

  <!-- Pin 10: IO26 -->
  <circle cx="430" cy="340" r="4" fill="#555"/>
  <text x="422" y="344" fill="#555" font-size="10" text-anchor="end">IO26</text>

  <!-- Pin 11: IO27 -->
  <circle cx="430" cy="362" r="4" fill="#555"/>
  <text x="422" y="366" fill="#555" font-size="10" text-anchor="end">IO27</text>

  <!-- Pin 12: IO14 -->
  <circle cx="430" cy="384" r="4" fill="#555"/>
  <text x="422" y="388" fill="#555" font-size="10" text-anchor="end">IO14</text>

  <!-- Pin 13: IO12 -->
  <circle cx="430" cy="406" r="4" fill="#555"/>
  <text x="422" y="410" fill="#555" font-size="10" text-anchor="end">IO12</text>

  <!-- Pin 14: GND -->
  <circle cx="430" cy="428" r="5" fill="#4ecdc4"/>
  <text x="422" y="432" fill="#4ecdc4" font-size="10" font-weight="bold" text-anchor="end">GND</text>
  <!-- tap to GND bus -->
  <line x1="430" y1="428" x2="430" y2="72" stroke="#4ecdc4" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Pin 15: IO13 -->
  <circle cx="430" cy="450" r="4" fill="#555"/>
  <text x="422" y="454" fill="#555" font-size="10" text-anchor="end">IO13</text>

  <!-- Pin 16: SD2 -->
  <circle cx="430" cy="472" r="4" fill="#444"/>
  <text x="422" y="476" fill="#444" font-size="10" text-anchor="end">SD2</text>

  <!-- Pin 17: SD3 -->
  <circle cx="430" cy="494" r="4" fill="#444"/>
  <text x="422" y="498" fill="#444" font-size="10" text-anchor="end">SD3</text>

  <!-- Pin 18: CMD -->
  <circle cx="430" cy="516" r="4" fill="#444"/>
  <text x="422" y="520" fill="#444" font-size="10" text-anchor="end">CMD</text>

  <!-- Pin 19: 5V -->
  <circle cx="430" cy="522" r="4" fill="#555"/>
  <text x="422" y="526" fill="#555" font-size="10" text-anchor="end">5V</text>

  <!-- ======== RIGHT PINS (19, top to bottom) ======== -->
  <!-- pin dots at x=660, labels at x=668 left-aligned -->

  <!-- Pin 1: GND -->
  <circle cx="660" cy="142" r="5" fill="#4ecdc4"/>
  <text x="668" y="146" fill="#4ecdc4" font-size="10" font-weight="bold">GND</text>
  <!-- tap to GND bus -->
  <line x1="660" y1="142" x2="660" y2="72" stroke="#4ecdc4" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Pin 2: IO23 -->
  <circle cx="660" cy="164" r="4" fill="#555"/>
  <text x="668" y="168" fill="#555" font-size="10">IO23</text>

  <!-- Pin 3: IO22 ← I2C SCL -->
  <circle cx="660" cy="186" r="6" fill="#a78bfa" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="668" y="190" fill="#a78bfa" font-size="10" font-weight="bold">IO22 (SCL)</text>

  <!-- Pin 4: TXD0 -->
  <circle cx="660" cy="208" r="4" fill="#555"/>
  <text x="668" y="212" fill="#555" font-size="10">TXD0</text>

  <!-- Pin 5: RXD0 -->
  <circle cx="660" cy="230" r="4" fill="#555"/>
  <text x="668" y="234" fill="#555" font-size="10">RXD0</text>

  <!-- Pin 6: IO21 ← I2C SDA -->
  <circle cx="660" cy="252" r="6" fill="#a78bfa" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="668" y="256" fill="#a78bfa" font-size="10" font-weight="bold">IO21 (SDA)</text>

  <!-- Pin 7: GND -->
  <circle cx="660" cy="274" r="5" fill="#4ecdc4"/>
  <text x="668" y="278" fill="#4ecdc4" font-size="10" font-weight="bold">GND</text>

  <!-- Pin 8: IO19 -->
  <circle cx="660" cy="296" r="4" fill="#555"/>
  <text x="668" y="300" fill="#555" font-size="10">IO19</text>

  <!-- Pin 9: IO18 -->
  <circle cx="660" cy="318" r="4" fill="#555"/>
  <text x="668" y="322" fill="#555" font-size="10">IO18</text>

  <!-- Pin 10: IO5 -->
  <circle cx="660" cy="340" r="4" fill="#555"/>
  <text x="668" y="344" fill="#555" font-size="10">IO5</text>

  <!-- Pin 11: IO17 -->
  <circle cx="660" cy="362" r="4" fill="#555"/>
  <text x="668" y="366" fill="#555" font-size="10">IO17</text>

  <!-- Pin 12: IO16 -->
  <circle cx="660" cy="384" r="4" fill="#555"/>
  <text x="668" y="388" fill="#555" font-size="10">IO16</text>

  <!-- Pin 13: IO4 ← DS18B20 OneWire -->
  <circle cx="660" cy="406" r="6" fill="#ffd93d" stroke="#ffb300" stroke-width="1.5"/>
  <text x="668" y="410" fill="#ffd93d" font-size="10" font-weight="bold">IO4  (OneWire)</text>

  <!-- Pin 14: IO0 -->
  <circle cx="660" cy="428" r="4" fill="#555"/>
  <text x="668" y="432" fill="#555" font-size="10">IO0</text>

  <!-- Pin 15: IO2 -->
  <circle cx="660" cy="450" r="4" fill="#555"/>
  <text x="668" y="454" fill="#555" font-size="10">IO2</text>

  <!-- Pin 16: IO15 -->
  <circle cx="660" cy="472" r="4" fill="#555"/>
  <text x="668" y="476" fill="#555" font-size="10">IO15</text>

  <!-- Pin 17: SD1 -->
  <circle cx="660" cy="494" r="4" fill="#444"/>
  <text x="668" y="498" fill="#444" font-size="10">SD1</text>

  <!-- Pin 18: SD0 -->
  <circle cx="660" cy="516" r="4" fill="#444"/>
  <text x="668" y="520" fill="#444" font-size="10">SD0</text>

  <!-- Pin 19: CLK -->
  <circle cx="660" cy="522" r="4" fill="#444"/>
  <text x="668" y="526" fill="#444" font-size="10">CLK</text>

  <!-- ======== SOIL MOISTURE SENSOR (left) ======== -->
  <rect x="30" y="100" width="190" height="110" rx="8" fill="#2a2a2a" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="125" y="122" fill="#4ecdc4" font-size="12" font-weight="bold" text-anchor="middle">Soil Moisture</text>
  <text x="125" y="137" fill="#666" font-size="9" text-anchor="middle">Capacitive v2.0</text>
  <!-- Pin dots on right edge -->
  <circle cx="220" cy="152" r="3" fill="#ff6b6b"/>
  <text x="210" y="156" fill="#ff6b6b" font-size="9" text-anchor="end">VCC</text>
  <circle cx="220" cy="170" r="3" fill="#4ecdc4"/>
  <text x="210" y="174" fill="#4ecdc4" font-size="9" text-anchor="end">GND</text>
  <circle cx="220" cy="188" r="3" fill="#ffd93d"/>
  <text x="210" y="192" fill="#ffd93d" font-size="9" text-anchor="end">AOUT</text>

  <!-- Soil VCC → 3V3 bus (up) -->
  <path d="M220,152 L310,152 L310,60" stroke="#ff6b6b" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <!-- Soil GND → GND bus (up) -->
  <path d="M220,170 L320,170 L320,72" stroke="#4ecdc4" stroke-width="1.5" fill="none"/>
  <!-- Soil AOUT → IO34 left pin -->
  <path d="M220,188 L380,188 L380,230 L430,230" stroke="#ffd93d" stroke-width="2" fill="none"/>
  <text x="300" y="224" fill="#ffd93d" font-size="9">IO34</text>

  <!-- ADC note -->
  <text x="30" y="226" fill="#ff6b6b" font-size="8">* ADC1 only — ADC2 unusable when WiFi on</text>

  <!-- ======== BH1750 Light Sensor (top right) ======== -->
  <rect x="800" y="92" width="190" height="110" rx="8" fill="#2a2a2a" stroke="#ffd93d" stroke-width="1.5"/>
  <text x="895" y="114" fill="#ffd93d" font-size="12" font-weight="bold" text-anchor="middle">BH1750</text>
  <text x="895" y="129" fill="#666" font-size="9" text-anchor="middle">Light Sensor (GY-302)</text>
  <text x="895" y="143" fill="#666" font-size="9" text-anchor="middle">I2C addr: 0x23</text>
  <circle cx="800" cy="158" r="3" fill="#ff6b6b"/>
  <text x="808" y="162" fill="#ff6b6b" font-size="9">VCC (3.3V)</text>
  <circle cx="800" cy="174" r="3" fill="#4ecdc4"/>
  <text x="808" y="178" fill="#4ecdc4" font-size="9">GND</text>
  <circle cx="800" cy="190" r="3" fill="#a78bfa"/>
  <text x="808" y="194" fill="#a78bfa" font-size="9">SDA</text>
  <circle cx="800" cy="200" r="3" fill="#a78bfa"/>
  <text x="808" y="204" fill="#a78bfa" font-size="9">SCL</text>

  <!-- BH1750 VCC → 3V3 bus -->
  <path d="M800,158 L760,158 L760,60" stroke="#ff6b6b" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <!-- BH1750 GND → GND bus -->
  <path d="M800,174 L770,174 L770,72" stroke="#4ecdc4" stroke-width="1.5" fill="none"/>
  <!-- BH1750 SDA → IO21 (right pin 6, y=252) -->
  <path d="M800,190 L735,190 L735,252 L660,252" stroke="#a78bfa" stroke-width="2" fill="none"/>
  <!-- BH1750 SCL → IO22 (right pin 3, y=186) -->
  <path d="M800,200 L740,200 L740,186 L660,186" stroke="#a78bfa" stroke-width="2" fill="none" stroke-dasharray="4,2"/>

  <!-- ======== BME280 (middle right) ======== -->
  <rect x="800" y="250" width="190" height="120" rx="8" fill="#2a2a2a" stroke="#74b9ff" stroke-width="1.5"/>
  <text x="895" y="272" fill="#74b9ff" font-size="12" font-weight="bold" text-anchor="middle">BME280</text>
  <text x="895" y="287" fill="#666" font-size="9" text-anchor="middle">Temp / Humidity / Pressure</text>
  <text x="895" y="301" fill="#666" font-size="9" text-anchor="middle">I2C addr: 0x76</text>
  <circle cx="800" cy="316" r="3" fill="#ff6b6b"/>
  <text x="808" y="320" fill="#ff6b6b" font-size="9">VCC (3.3V)</text>
  <circle cx="800" cy="332" r="3" fill="#4ecdc4"/>
  <text x="808" y="336" fill="#4ecdc4" font-size="9">GND</text>
  <circle cx="800" cy="348" r="3" fill="#a78bfa"/>
  <text x="808" y="352" fill="#a78bfa" font-size="9">SDA (shared I2C)</text>
  <circle cx="800" cy="358" r="3" fill="#a78bfa"/>
  <text x="808" y="362" fill="#a78bfa" font-size="9">SCL (shared I2C)</text>

  <!-- BME280 VCC → 3V3 bus -->
  <path d="M800,316 L755,316 L755,60" stroke="#ff6b6b" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <!-- BME280 GND → GND bus -->
  <path d="M800,332 L765,332 L765,72" stroke="#4ecdc4" stroke-width="1.5" fill="none"/>
  <!-- BME280 SDA → shared bus to IO21 -->
  <path d="M800,348 L735,348" stroke="#a78bfa" stroke-width="2" fill="none"/>
  <!-- BME280 SCL → shared bus to IO22 -->
  <path d="M800,358 L740,358" stroke="#a78bfa" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
  <!-- Shared I2C node marker -->
  <circle cx="735" cy="252" r="4" fill="#a78bfa"/>
  <circle cx="735" cy="348" r="4" fill="#a78bfa"/>
  <text x="720" y="302" fill="#a78bfa" font-size="8" text-anchor="middle">I2C</text>
  <text x="720" y="312" fill="#a78bfa" font-size="8" text-anchor="middle">bus</text>

  <!-- ======== DS18B20 (lower right) ======== -->
  <rect x="800" y="420" width="190" height="130" rx="8" fill="#2a2a2a" stroke="#ff9f43" stroke-width="1.5"/>
  <text x="895" y="442" fill="#ff9f43" font-size="12" font-weight="bold" text-anchor="middle">DS18B20</text>
  <text x="895" y="457" fill="#666" font-size="9" text-anchor="middle">Waterproof Soil Temp Probe</text>
  <circle cx="800" cy="472" r="3" fill="#ff6b6b"/>
  <text x="808" y="476" fill="#ff6b6b" font-size="9">VCC (3.3V)</text>
  <circle cx="800" cy="488" r="3" fill="#4ecdc4"/>
  <text x="808" y="492" fill="#4ecdc4" font-size="9">GND</text>
  <circle cx="800" cy="504" r="3" fill="#ffd93d"/>
  <text x="808" y="508" fill="#ffd93d" font-size="9">DATA</text>
  <!-- 4.7k pull-up resistor -->
  <rect x="832" y="516" width="56" height="16" rx="3" fill="#333" stroke="#ff9f43" stroke-width="1"/>
  <text x="860" y="528" fill="#ff9f43" font-size="9" text-anchor="middle">4.7kΩ ↑</text>
  <text x="860" y="540" fill="#888" font-size="7" text-anchor="middle">DATA → 3V3</text>

  <!-- DS18B20 VCC → 3V3 bus -->
  <path d="M800,472 L750,472 L750,60" stroke="#ff6b6b" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <!-- DS18B20 GND → GND bus -->
  <path d="M800,488 L745,488 L745,72" stroke="#4ecdc4" stroke-width="1.5" fill="none"/>
  <!-- DS18B20 DATA → IO4 (right pin 13, y=406) -->
  <path d="M800,504 L725,504 L725,406 L660,406" stroke="#ffd93d" stroke-width="2" fill="none"/>
  <text x="700" y="400" fill="#ffd93d" font-size="9">IO4</text>

  <!-- ======== Power Section (bottom) ======== -->
  <rect x="170" y="578" width="430" height="120" rx="8" fill="#1e1e1e" stroke="#555" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="385" y="597" fill="#888" font-size="12" font-weight="bold" text-anchor="middle">OUTDOOR ONLY — Battery + Solar</text>
  <rect x="185" y="605" width="110" height="55" rx="5" fill="#2a2a2a" stroke="#ffd93d" stroke-width="1"/>
  <text x="240" y="626" fill="#ffd93d" font-size="10" font-weight="bold" text-anchor="middle">Solar Panel</text>
  <text x="240" y="641" fill="#666" font-size="9" text-anchor="middle">6V 1W</text>
  <text x="240" y="654" fill="#888" font-size="8" text-anchor="middle">+  /  −</text>
  <rect x="325" y="605" width="100" height="55" rx="5" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="375" y="626" fill="#ff6b6b" font-size="10" font-weight="bold" text-anchor="middle">TP4056</text>
  <text x="375" y="641" fill="#666" font-size="9" text-anchor="middle">USB-C Charger</text>
  <text x="375" y="654" fill="#888" font-size="8" text-anchor="middle">IN→BAT→OUT</text>
  <rect x="455" y="605" width="110" height="55" rx="5" fill="#2a2a2a" stroke="#00C853" stroke-width="1"/>
  <text x="510" y="626" fill="#00C853" font-size="10" font-weight="bold" text-anchor="middle">18650</text>
  <text x="510" y="641" fill="#666" font-size="9" text-anchor="middle">3.7V 3000mAh</text>
  <text x="510" y="654" fill="#888" font-size="8" text-anchor="middle">+  /  −</text>
  <line x1="295" y1="632" x2="323" y2="632" stroke="#ffd93d" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="425" y1="632" x2="453" y2="632" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M375,605 L375,572 L430,572" stroke="#ff6b6b" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="400" y="568" fill="#ff6b6b" font-size="8">5V+GND → ESP32</text>

  <!-- ======== Legend ======== -->
  <rect x="30" y="578" width="130" height="116" rx="6" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="95" y="596" fill="#ccc" font-size="11" font-weight="bold" text-anchor="middle">Wire Colors</text>
  <line x1="45" y1="610" x2="78" y2="610" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="85" y="614" fill="#ff6b6b" font-size="9">3.3V Power</text>
  <line x1="45" y1="628" x2="78" y2="628" stroke="#4ecdc4" stroke-width="2"/>
  <text x="85" y="632" fill="#4ecdc4" font-size="9">Ground (GND)</text>
  <line x1="45" y1="646" x2="78" y2="646" stroke="#ffd93d" stroke-width="2"/>
  <text x="85" y="650" fill="#ffd93d" font-size="9">Data / Signal</text>
  <line x1="45" y1="664" x2="78" y2="664" stroke="#a78bfa" stroke-width="2"/>
  <text x="85" y="668" fill="#a78bfa" font-size="9">I2C SDA</text>
  <line x1="45" y1="682" x2="78" y2="682" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="85" y="686" fill="#a78bfa" font-size="9">I2C SCL</text>

  <!-- ======== I2C Addresses ======== -->
  <rect x="640" y="582" width="160" height="80" rx="6" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="720" y="600" fill="#aaa" font-size="10" font-weight="bold" text-anchor="middle">I2C Addresses</text>
  <text x="720" y="618" fill="#ffd93d" font-size="9" text-anchor="middle">BH1750: 0x23</text>
  <text x="720" y="634" fill="#74b9ff" font-size="9" text-anchor="middle">BME280: 0x76 (or 0x77)</text>
  <text x="720" y="650" fill="#888" font-size="8" text-anchor="middle">ADDR pin LOW = 0x23 / 0x76</text>

  <!-- ======== Pin legend ======== -->
  <circle cx="815" cy="585" r="5" fill="#ffd93d" stroke="#ffb300" stroke-width="1.5"/>
  <text x="825" y="589" fill="#ffd93d" font-size="9">Signal pin used</text>
  <circle cx="815" cy="601" r="5" fill="#a78bfa" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="825" y="605" fill="#a78bfa" font-size="9">I2C pin used</text>
  <circle cx="815" cy="617" r="4" fill="#555"/>
  <text x="825" y="621" fill="#555" font-size="9">Unused pin</text>
</svg>
